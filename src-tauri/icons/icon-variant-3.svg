<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="docA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="docB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#dce6ff"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadowCheck" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#059669" flood-opacity="0.3"/>
    </filter>
    <filter id="glowArrow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#007aff" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg3)"/>

  <!-- Left document (A) -->
  <g filter="url(#shadow3)">
    <rect x="120" y="220" width="320" height="440" rx="14" ry="14" fill="url(#docA)"/>
    <!-- Dog ear -->
    <path d="M396 220 L440 220 L440 264 Z" fill="#ddd"/>
    <path d="M396 220 L440 264 L396 264 Z" fill="#ccc"/>
    <!-- Text lines -->
    <rect x="156" y="290" width="180" height="12" rx="3" fill="#bbb"/>
    <rect x="156" y="316" width="240" height="12" rx="3" fill="#ccc"/>
    <rect x="156" y="342" width="200" height="12" rx="3" fill="#ccc"/>
    <!-- Red diff line -->
    <rect x="146" y="374" width="260" height="28" rx="4" fill="#fee2e2"/>
    <rect x="156" y="380" width="220" height="14" rx="3" fill="#ef4444" opacity="0.5"/>
    <rect x="156" y="418" width="240" height="12" rx="3" fill="#ccc"/>
    <rect x="156" y="444" width="160" height="12" rx="3" fill="#bbb"/>
    <!-- Another red diff -->
    <rect x="146" y="472" width="260" height="28" rx="4" fill="#fee2e2"/>
    <rect x="156" y="478" width="200" height="14" rx="3" fill="#ef4444" opacity="0.5"/>
    <rect x="156" y="516" width="220" height="12" rx="3" fill="#ccc"/>
    <rect x="156" y="542" width="240" height="12" rx="3" fill="#bbb"/>
    <rect x="156" y="568" width="180" height="12" rx="3" fill="#ccc"/>
    <rect x="156" y="594" width="200" height="12" rx="3" fill="#ccc"/>
    <rect x="156" y="620" width="240" height="12" rx="3" fill="#bbb"/>

    <!-- "A" label -->
    <text x="280" y="250" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="600" fill="#999" text-anchor="middle">A</text>
  </g>

  <!-- Right document (B) -->
  <g filter="url(#shadow3)">
    <rect x="584" y="220" width="320" height="440" rx="14" ry="14" fill="url(#docB)"/>
    <!-- Dog ear -->
    <path d="M860 220 L904 220 L904 264 Z" fill="#c8d6f0"/>
    <path d="M860 220 L904 264 L860 264 Z" fill="#b0c4e8"/>
    <!-- Text lines -->
    <rect x="620" y="290" width="180" height="12" rx="3" fill="#a0aec0"/>
    <rect x="620" y="316" width="240" height="12" rx="3" fill="#b0bec5"/>
    <rect x="620" y="342" width="200" height="12" rx="3" fill="#b0bec5"/>
    <!-- Green diff line -->
    <rect x="610" y="374" width="260" height="28" rx="4" fill="#dcfce7"/>
    <rect x="620" y="380" width="220" height="14" rx="3" fill="#22c55e" opacity="0.5"/>
    <rect x="620" y="418" width="240" height="12" rx="3" fill="#b0bec5"/>
    <rect x="620" y="444" width="160" height="12" rx="3" fill="#a0aec0"/>
    <!-- Another green diff -->
    <rect x="610" y="472" width="260" height="28" rx="4" fill="#dcfce7"/>
    <rect x="620" y="478" width="200" height="14" rx="3" fill="#22c55e" opacity="0.5"/>
    <rect x="620" y="516" width="220" height="12" rx="3" fill="#b0bec5"/>
    <rect x="620" y="542" width="240" height="12" rx="3" fill="#a0aec0"/>
    <rect x="620" y="568" width="180" height="12" rx="3" fill="#b0bec5"/>
    <rect x="620" y="594" width="200" height="12" rx="3" fill="#b0bec5"/>
    <rect x="620" y="620" width="240" height="12" rx="3" fill="#a0aec0"/>

    <!-- "B" label -->
    <text x="744" y="250" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="600" fill="#8899bb" text-anchor="middle">B</text>
  </g>

  <!-- Connecting arrows between documents -->
  <g filter="url(#glowArrow)">
    <!-- Forward arrow (A -> B) -->
    <path d="M455 400 L490 400 L490 392 L520 410 L490 428 L490 420 L455 420 Z" fill="#007aff" opacity="0.7"/>
    <!-- Backward arrow (B -> A) -->
    <path d="M569 440 L534 440 L534 432 L504 450 L534 468 L534 460 L569 460 Z" fill="#007aff" opacity="0.7"/>
  </g>

  <!-- Checkmark badge (bottom center) -->
  <g filter="url(#shadowCheck)">
    <circle cx="512" cy="780" r="90" fill="url(#circleGrad)"/>
    <circle cx="512" cy="780" r="76" fill="url(#checkGrad)"/>
    <!-- Checkmark -->
    <polyline points="468,780 500,816 560,748" fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
